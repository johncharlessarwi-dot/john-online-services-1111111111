<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — John Online Services</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 2rem 1rem; }
    
    .container { max-width: 1000px; margin: 0 auto; }
    .card { background: var(--card-bg); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); margin-bottom: 2rem; }
    
    h1, h2, h3 { margin-bottom: 1.5rem; font-weight: 700; color: #0f172a; }
    h1 { text-align: center; font-size: 1.75rem; }
    h2 { font-size: 1.5rem; border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; margin-top: 1rem; }

    /* Forms & Inputs */
    form { display: flex; flex-direction: column; gap: 1rem; }
    .form-inline { flex-direction: row; flex-wrap: wrap; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.25rem; }
    
    label { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); }
    input, select { padding: 0.625rem 0.75rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.95rem; background: var(--card-bg); color: var(--text); transition: border-color 0.2s; }
    input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    .form-inline input { flex: 1; min-width: 140px; }

    /* Buttons */
    button { background: var(--primary); color: white; border: none; padding: 0.625rem 1.25rem; font-weight: 600; border-radius: 6px; cursor: pointer; transition: background 0.2s; font-size: 0.95rem; }
    button:hover { background: var(--primary-hover); }
    button.btn-danger { background: var(--danger); }
    button.btn-danger:hover { background: var(--danger-hover); }
    button.btn-secondary { background: var(--text-muted); }
    button.btn-secondary:hover { background: #475569; }
    
    /* Tables */
    .table-container { width: 100%; overflow-x: auto; margin-top: 1rem; border-radius: 6px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; background: var(--card-bg); }
    th { background: #f1f5f9; font-weight: 600; color: var(--text-muted); padding: 0.75rem 1rem; border-bottom: 2px solid var(--border); }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    
    .actions-cell { display: flex; gap: 0.5rem; align-items: center; }
    .table-container input { padding: 0.375rem 0.5rem; width: 100%; max-width: 160px; }
    .table-container select { padding: 0.375rem 0.5rem; }

    /* Utility */
    .hidden { display: none !important; }
    .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  </style>
</head>
<body>
  <div class="container">

    <div id="loginBox" class="card" style="max-width: 450px; margin: 4rem auto;">
      <h1>Admin Login</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
        </div>
        <button type="submit">Sign In</button>
      </form>
    </div>

    <div id="panel" class="hidden">
      <div class="header-flex">
        <h2>Dashboard Panel</h2>
        <button id="logoutBtn" class="btn-secondary">Log Out</button>
      </div>

      <div class="card">
        <h3>Orders Management</h3>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Customer Name</th>
                <th>Phone</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders">
              </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3>Services Management</h3>
        <form id="newForm" class="form-inline">
          <input id="new_title" placeholder="Service Title" required>
          <input id="new_slug" placeholder="Slug/URL (e.g., web-design)">
          <input id="new_price" type="number" step="0.01" placeholder="Price" required>
          <button type="submit">Add Service</button>
        </form>
        
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Slug</th>
                <th>Price</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="services">
              </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Application Initialization & View Switcher
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('admin_token');
      if (token) {
        showPanel();
      }
      
      document.getElementById('loginForm').addEventListener('submit', login);
      document.getElementById('newForm').addEventListener('submit', createService);
      document.getElementById('logoutBtn').addEventListener('click', logout);
    });

    function showPanel() {
      document.getElementById('loginBox').classList.add('hidden');
      document.getElementById('panel').classList.remove('hidden');
      loadOrders();
      loadServices();
    }

    function logout() {
      localStorage.removeItem('admin_token');
      document.getElementById('panel').classList.add('hidden');
      document.getElementById('loginBox').classList.remove('hidden');
    }

    function getHeaders(extraHeaders = {}) {
      const token = localStorage.getItem('admin_token');
      const headers = { ...extraHeaders };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }
      return headers;
    }

    // --- Authentication ---
    async function login(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const j = await r.json();
        
        if (j.token) {
          localStorage.setItem('admin_token', j.token);
          showPanel();
        } else {
          alert(j.error || 'Login failed. Please check your credentials.');
        }
      } catch (err) {
        alert('An network error occurred during login.');
      }
    }

    // --- Orders Domain ---
    async function loadOrders() {
      try {
        const r = await fetch('/api/orders', { headers: getHeaders() });
        const rows = await r.json();
        const tbody = document.getElementById('orders'); 
        tbody.innerHTML = '';
        
        const statuses = ['pending', 'paid', 'processing', 'done'];

        rows.forEach(o => {
          const tr = document.createElement('tr');
          
          // Generate active selected option state safely
          const optionsHtml = statuses.map(st => 
            `<option value="${st}" ${o.status === st ? 'selected' : ''}>${st}</option>`
          ).join('');

          tr.innerHTML = `
            <td><strong>#${o.id}</strong></td>
            <td>${o.customer_name || '—'}</td>
            <td>${o.customer_phone || '—'}</td>
            <td>$${Number(o.total || 0).toFixed(2)}</td>
            <td>
              <select data-id="${o.id}">
                ${optionsHtml}
              </select>
            </td>
            <td>
              <div class="actions-cell">
                <button data-id="${o.id}">Save</button>
                <button data-del="${o.id}" class="btn-danger">Delete</button>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        });

        // Event delegation binding alternatives for dynamic contents
        tbody.querySelectorAll('button[data-id]').forEach(btn => btn.addEventListener('click', saveOrderStatus));
        tbody.querySelectorAll('button[data-del]').forEach(btn => btn.addEventListener('click', deleteOrder));
      } catch (err) {
        console.error('Error loading orders:', err);
      }
    }

    async function saveOrderStatus(ev) {
      const id = ev.currentTarget.dataset.id;
      const selectEl = document.querySelector(`select[data-id="${id}"]`);
      const status = selectEl.value;

      const res = await fetch(`/api/orders/${id}/status`, {
        method: 'PUT',
